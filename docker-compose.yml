services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-service
      - frontend

  api-service:
    build: ./backend
    environment:
      - DB_HOST=mariadb
      - REDIS_HOST=redis
      - COMPUTE_SERVICE_URL=http://compute-service:5000
      - WORKER_URL=http://worker-service:8080
    depends_on:
      - mariadb
      - redis
      - compute-service
      - worker-service

  compute-service:
    build: ./compute-engine
    ports:
      - "5001:5000"

  worker-service:
    build: ./worker
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - API_BASE_URL=http://api-service:3000
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api

  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: diving_db
      MYSQL_USER: diver
      MYSQL_PASSWORD: divepassword
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
