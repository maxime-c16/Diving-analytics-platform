# ============================================
# OPTIMIZED DOCKER COMPOSE CONFIGURATION
# ============================================
# This configuration uses:
# - Alpine variants for minimal size
# - Health checks for all services
# - Resource limits
# - BuildKit cache mounts
# - Restart policies
# ============================================

# ============================================
# SERVICES
# ============================================
services:

  # ==========================================
  # NGINX - Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:1.25-alpine  # Specific version, Alpine variant (~24MB)
    container_name: diving-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      api-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-network
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # ==========================================
  # API SERVICE - NestJS Backend
  # ==========================================
  api-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      cache_from:
        - diving-analytics-backend:latest
    image: diving-analytics-backend:latest
    container_name: diving-api
    environment:
      - NODE_ENV=production
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=diving_db
      - DB_USER=diver
      - DB_PASSWORD=divepassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COMPUTE_SERVICE_URL=http://compute-service:5000
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      compute-service:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - backend-network
      - database-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==========================================
  # COMPUTE SERVICE - Python Flask
  # ==========================================
  compute-service:
    build:
      context: ./compute-engine
      dockerfile: Dockerfile
      target: production
      cache_from:
        - diving-analytics-compute:latest
    image: diving-analytics-compute:latest
    container_name: diving-compute
    ports:
      - "5001:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==========================================
  # WORKER SERVICE - Python Celery
  # ==========================================
  worker-service:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: production
      cache_from:
        - diving-analytics-worker:latest
    image: diving-analytics-worker:latest
    container_name: diving-worker
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=diving_db
      - DB_USER=diver
      - DB_PASSWORD=divepassword
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
      - database-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==========================================
  # FRONTEND - Next.js
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      cache_from:
        - diving-analytics-frontend:latest
    image: diving-analytics-frontend:latest
    container_name: diving-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ==========================================
  # MARIADB - Database
  # ==========================================
  mariadb:
    image: mariadb:10.11  # Latest LTS version
    container_name: diving-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-diving_db}
      MYSQL_USER: ${MYSQL_USER:-diver}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-divepassword}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    restart: unless-stopped
    networks:
      - database-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # REDIS - Cache & Queue
  # ==========================================
  redis:
    image: redis:7.2-alpine  # Latest stable Alpine (~32MB)
    container_name: diving-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

# ============================================
# NETWORKS - Isolated network segments
# ============================================
networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
  database-network:
    driver: bridge
    internal: true  # No external access

# ============================================
# VOLUMES - Persistent data
# ============================================
volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local
