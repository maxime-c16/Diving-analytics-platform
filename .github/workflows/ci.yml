name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify OCR parser syntax
        run: python3 -m py_compile worker/extract_pdf.py

      - name: Check web app
        run: bun run check:web

  smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Start API
        run: bun run start > /tmp/diving-api.log 2>&1 &
        working-directory: apps/api

      - name: Start web app
        run: bun run dev > /tmp/diving-web.log 2>&1 &
        working-directory: apps/web

      - name: Wait for services
        run: |
          for url in http://127.0.0.1:4101/health http://127.0.0.1:4100/; do
            for attempt in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Service did not become ready: $url"
                echo "--- API log ---"
                cat /tmp/diving-api.log || true
                echo "--- Web log ---"
                cat /tmp/diving-web.log || true
                exit 1
              fi
              sleep 1
            done
          done

      - name: Run smoke test
        run: bun run smoke:web

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-service-logs
          path: |
            /tmp/diving-api.log
            /tmp/diving-web.log
